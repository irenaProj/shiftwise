name: Docs

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  generate-typedoc:
    name: Generate TypeDoc into docs/api/
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Generate Prisma client
        run: cd backend && npx prisma generate

      - name: Generate TypeDoc
        run: npx typedoc

      - name: Commit and push docs/api/ if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add docs/api/
          git diff --staged --quiet || git commit -m "chore: regenerate TypeDoc [skip ci]"
          git push
